services:
  api:
    build: ./api
    ports:
      - "${API_PORT}:3001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started

  web:
    build: ./web
    ports:
      - "${WEB_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - api

  worker:
    build: ./api
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started

  db:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  db-data:
