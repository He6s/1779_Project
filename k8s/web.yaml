apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: settleup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: settleup-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: settleup-app-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: settleup
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
