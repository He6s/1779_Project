apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: settleup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: worker
          image: settleup-api:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "src/worker.js"]
          envFrom:
            - configMapRef:
                name: settleup-app-config
            - secretRef:
                name: settleup-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 384Mi
