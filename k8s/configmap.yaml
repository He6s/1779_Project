apiVersion: v1
kind: ConfigMap
metadata:
  name: settleup-app-config
  namespace: settleup
data:
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  API_PORT: "3001"
  WEB_PORT: "3000"
  CORS_ORIGIN: "*"
  API_BASE_URL: http://localhost:3001
  JWT_EXPIRES_IN: 24h
  APP_BASE_URL: http://settleup.local
  EMAIL_QUEUE_KEY: email_jobs
  EMAIL_ENABLED: "false"
  SMTP_HOST: ""
  SMTP_PORT: "2525"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: settleup-db-init
  namespace: settleup
data:
  001_init.sql: |
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    CREATE TABLE IF NOT EXISTS users (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      email TEXT UNIQUE NOT NULL,
      password_hash TEXT NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS groups (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      name TEXT NOT NULL,
      created_by UUID REFERENCES users(id),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS group_members (
      group_id UUID REFERENCES groups(id) ON DELETE CASCADE,
      user_id UUID REFERENCES users(id) ON DELETE CASCADE,
      nickname TEXT,
      joined_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (group_id, user_id)
    );

    CREATE TABLE IF NOT EXISTS expenses (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      group_id UUID REFERENCES groups(id),
      paid_by UUID REFERENCES users(id),
      description TEXT NOT NULL,
      amount_cents INTEGER NOT NULL,
      currency TEXT NOT NULL DEFAULT 'CAD',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS splits (
      expense_id UUID REFERENCES expenses(id),
      user_id UUID REFERENCES users(id),
      owed_cents INTEGER NOT NULL,
      split_type TEXT NOT NULL,
      metadata JSONB,
      PRIMARY KEY (expense_id, user_id)
    );

    CREATE TABLE IF NOT EXISTS settlements (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      group_id UUID REFERENCES groups(id),
      from_user UUID REFERENCES users(id),
      to_user UUID REFERENCES users(id),
      amount_cents INTEGER NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS activity_log (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      group_id UUID REFERENCES groups(id),
      user_id UUID REFERENCES users(id),
      action_type TEXT NOT NULL,
      payload JSONB,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
  002_constraints_and_indexes.sql: |
    ALTER TABLE activity_log
    ALTER COLUMN id SET DEFAULT gen_random_uuid();

    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT 1
        FROM pg_constraint
        WHERE conname = 'splits_split_type_check'
      ) THEN
        ALTER TABLE splits
        ADD CONSTRAINT splits_split_type_check
        CHECK (split_type IN ('equal', 'percentage', 'exact'));
      END IF;
    END
    $$;

    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT 1
        FROM pg_constraint
        WHERE conname = 'expenses_amount_positive_check'
      ) THEN
        ALTER TABLE expenses
        ADD CONSTRAINT expenses_amount_positive_check
        CHECK (amount_cents > 0);
      END IF;
    END
    $$;

    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT 1
        FROM pg_constraint
        WHERE conname = 'settlements_amount_positive_check'
      ) THEN
        ALTER TABLE settlements
        ADD CONSTRAINT settlements_amount_positive_check
        CHECK (amount_cents > 0);
      END IF;
    END
    $$;

    CREATE INDEX IF NOT EXISTS idx_group_members_group_id ON group_members(group_id);
    CREATE INDEX IF NOT EXISTS idx_expenses_group_id ON expenses(group_id);
    CREATE INDEX IF NOT EXISTS idx_settlements_group_id ON settlements(group_id);
    CREATE INDEX IF NOT EXISTS idx_activity_log_group_id ON activity_log(group_id);
