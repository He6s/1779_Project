apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: settleup
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: settleup-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: settleup-app-config
            - secretRef:
                name: settleup-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: settleup
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001
