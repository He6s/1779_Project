apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: settleup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: settleup
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
