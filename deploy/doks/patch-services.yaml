apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: settleup
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: settleup-web-lb
    service.beta.kubernetes.io/do-loadbalancer-size-unit: "1"
spec:
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: settleup
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: settleup-api-lb
    service.beta.kubernetes.io/do-loadbalancer-size-unit: "1"
spec:
  type: LoadBalancer
